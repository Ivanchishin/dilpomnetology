
services:

  db:
    image: postgres:16
    container_name: diplom_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data


  redis:
    image: redis:7-alpine
    container_name: diplom_redis
    restart: always
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: diplom_web
    restart: always
    command: >
      sh -c "
      python manage.py migrate &&
      gunicorn root.wsgi:application
      --bind 0.0.0.0:8000
      "
    volumes:
      - .:/app
      - media_volume:/app/media
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  celery:
    build: .
    container_name: diplom_celery
    restart: always
    command: celery -A root worker -l info
    volumes:
      - .:/app
      - media_volume:/app/media
    env_file:
      - .env
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  media_volume:
